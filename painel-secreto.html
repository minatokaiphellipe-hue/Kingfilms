<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="referrer" content="origin"><title>KF Admin Pro</title>
<style>body{background:#071022;color:#fff;font-family:sans-serif;padding:10px;text-align:center}.c{max-width:650px;margin:auto;background:#111;padding:15px;border-radius:8px}input,select{width:100%;padding:10px;background:#000;color:#fff;border:1px solid #333;border-radius:5px;margin-bottom:10px;box-sizing:border-box}.btn{background:#e50914;color:#fff;border:none;padding:15px;width:100%;border-radius:5px;font-weight:bold;margin-bottom:10px;cursor:pointer;transition:0.3s}.hd{display:none}.blk{background:#1a1a1a;padding:10px;margin-bottom:10px;border-left:3px solid #e50914}.sw{display:flex;gap:10px;margin-bottom:15px;justify-content:center;flex-wrap:wrap}label{font-size:13px;color:#aaa}</style></head>
<body>
<div class="c">
<h1 style="color:#e50914;margin:0 0 15px">KINGFILMS PRO</h1>
<div class="sw"><label><input type="radio" name="md" value="add" checked onchange="tT()"> ➕ Lote</label><label><input type="radio" name="md" value="tmdb" onchange="tT()"> 🔍 TMDB</label><label><input type="radio" name="md" value="api" onchange="tT()"> 🌐 API</label><label><input type="radio" name="md" value="rem" onchange="tT()"> 🗑️ Remover</label></div>
<div class="blk"><input id="gO" placeholder="User GitHub"><input id="gR" placeholder="Repo GitHub"><input type="password" id="gT" placeholder="Token GitHub"></div>
<div id="t-add"><div id="blks"></div><button class="btn" style="background:#222" onclick="ab()">➕ NOVO BLOCO VAZIO</button><button class="btn" id="b-add" onclick="p()">🚀 PUBLICAR CONTEÚDO</button></div>
<div id="t-tmdb" class="hd"><div class="blk"><input id="tq" placeholder="Digite o nome do Filme ou Série..."><button class="btn" style="background:#f5c518;color:#000" id="b-tmdb" onclick="bT()">🔍 PESQUISAR NO TMDB</button></div><div id="tR"></div></div>
<div id="t-api" class="hd"><div class="blk"><input id="aT" value="dcba86682627955f86aab2314586c52fcb56015a1231de58f23ce8999abdcf89">
<div style="display:flex;gap:5px;margin-bottom:10px"><select id="aTp" style="margin-bottom:0"><option value="filmes">Filmes</option><option value="series">Séries</option></select><input id="aPg" type="number" title="Página" value="1" style="width:80px;margin-bottom:0"></div>
<button class="btn" style="background:#0055ff" id="b-api" onclick="ca()">🌐 BUSCAR NA API</button></div><div id="aR"></div></div>
<div id="t-rem" class="hd"><div class="blk"><button class="btn" style="background:#222" id="b-remC" onclick="cc()">🔄 LER SITE</button><select id="sR" class="hd"></select><button class="btn hd" id="b-rem" style="background:#600" onclick="rc()">🗑️ APAGAR DO SITE</button></div></div>
<div id="log" style="color:#46d369;font-family:monospace;margin-top:10px"></div>
</div>
<script>
let bc=0,cat=[],AK="030452040d985e40fd3a2a044963e8c0";
const g=i=>document.getElementById(i),v=i=>g(i).value.trim(),l=m=>{g('log').innerHTML+=m+"<br>";g('log').style.display='block'};
window.onload=()=>{['gO','gR','gT'].forEach(i=>g(i).value=localStorage.getItem(i)||'');ab();}
function tT(){let m=document.querySelector('input[name="md"]:checked').value;g('t-add').className=m=='add'?'':'hd';g('t-tmdb').className=m=='tmdb'?'':'hd';g('t-api').className=m=='api'?'':'hd';g('t-rem').className=m=='rem'?'':'hd';g('log').innerHTML='';}
function ab(){if(bc>=5)return alert("Max 5 blocos");bc++;let n=bc,d=document.createElement('div');d.className='blk';d.id=`b_${n}`;
d.innerHTML=`<div style="display:flex;justify-content:space-between"><b>Conteúdo #${n}</b>${n>1?`<button style="background:#600;color:#fff;border:none;border-radius:3px;padding:2px 8px;cursor:pointer" onclick="g('b_${n}').remove()">X</button>`:''}</div>
<label><input type="radio" name="t_${n}" value="f" checked onchange="mt(${n})"> Filme</label> <label><input type="radio" name="t_${n}" value="s" onchange="mt(${n})"> Série</label>
<div style="display:flex;gap:5px"><input id="i_${n}" placeholder="ID TMDB" type="number" style="margin-bottom:10px"><select id="c_${n}" style="margin-bottom:10px"><option value="Ação">Ação</option><option value="Animações">Animações</option><option value="Animes">Animes</option><option value="Comédia">Comédia</option><option value="Drama">Drama</option><option value="Fantasia">Fantasia</option><option value="Novelas">Novelas</option><option value="Romance">Romance</option><option value="Séries">Séries</option><option value="Terror">Terror</option></select></div>
<input id="cp_${n}" placeholder="Capa Amazon (Ou vazio para Auto TMDB)"><div id="f_${n}"><input id="lV_${n}" placeholder="Link MP4 Filme" type="url"></div>
<div id="s_${n}" class="hd"><input id="lB_${n}" placeholder="Base Ep (ex: http.../ep)" type="url"><div style="display:flex;gap:5px"><input id="iE_${n}" placeholder="ID 1º Ep" type="number"><input id="sf_${n}" value=".mp4"></div></div>`;g('blks').appendChild(d);}
function mt(n){let s=document.querySelector(`input[name="t_${n}"]:checked`).value=='s';g(`f_${n}`).className=s?'hd':'';g(`s_${n}`).className=s?'':'hd';}
function b6(s){return btoa(unescape(encodeURIComponent(s)));}
function fD(m){return m?`PT${Math.floor(m/60)}H${m%60}M00S`:"PT01H30M00S";}

/* MOTOR CLÁSSICO SEGURO (MÉTODO PUT APROVADO PELOS NAVEGADORES E TELEMÓVEL) */
async function sR(p,c,m,t,u,r){let uR=`https://api.github.com/repos/${u}/${r}/contents/${p}`,sh=null;try{let rq=await fetch(uR+"?t="+Date.now(),{headers:{Authorization:`Bearer ${t}`},cache:"no-store"});if(rq.ok)sh=(await rq.json()).sha;}catch{}
let bd={message:m,content:b6(c)};if(sh)bd.sha=sh;let rs=await fetch(uR,{method:"PUT",headers:{Authorization:`Bearer ${t}`,"Content-Type":"application/json"},body:JSON.stringify(bd)});if(!rs.ok)throw new Error((await rs.json()).message);}

async function bT(){let q=v('tq');if(!q)return;g('b-tmdb').innerText="⏳ PESQUISANDO...";try{let r=await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${AK}&language=pt-BR&query=${encodeURIComponent(q)}`);let d=await r.json(),h="";if(d.results&&d.results.length){d.results.forEach(i=>{if(i.media_type==='person')return;let t=i.title||i.name,dt=i.release_date||i.first_air_date||'',tp=i.media_type==='movie'?'Filme':'Série',p=i.poster_path?`https://image.tmdb.org/t/p/w92${i.poster_path}`:'';h+=`<div class="blk" style="display:flex;justify-content:space-between;align-items:center;text-align:left"><div style="display:flex;gap:10px;align-items:center">${p?`<img src="${p}" style="width:35px;border-radius:4px">`:''}<div style="font-size:12px;line-height:1.4"><b>${t}</b> ${dt?'('+dt.substring(0,4)+')':''}<br><span style="color:#aaa">ID: ${i.id} | ${tp}</span></div></div><button style="background:#e50914;color:#fff;border:none;padding:6px 12px;border-radius:4px;font-weight:bold" onclick="uT('${i.id}',${i.media_type==='tv'})">⬇️ Usar</button></div>`;});g('tR').innerHTML=h||"Nenhum resultado válido.";}else g('tR').innerHTML="Nada encontrado no TMDB.";}catch(e){g('tR').innerHTML="Erro: "+e.message;}g('b-tmdb').innerText="🔍 PESQUISAR NO TMDB";}
function uT(id,isS){if(bc>=5)return alert("Lote cheio");document.querySelector('input[name="md"][value="add"]').checked=true;tT();ab();if(isS){document.querySelector(`input[name="t_${bc}"][value="s"]`).checked=true;}else{document.querySelector(`input[name="t_${bc}"][value="f"]`).checked=true;}mt(bc);g(`i_${bc}`).value=id;}

async function ca(){
let t=v('aT'),tp=v('aTp'),pg=v('aPg')||1;
if(!t)return;g('b-api').innerText="⏳ A BUSCAR...";let u=`https://qcrhfzckhdsryjlesrsu.supabase.co/functions/v1/content-api?action=${tp}&token=${t}&page=${pg}&limit=100`;let txt="";
try{let r=await fetch(u,{headers:{"Origin":"https://kingfilms.shop/","Referer":"https://kingfilms.shop/"}});txt=await r.text();let js=JSON.parse(txt),h="";if(js.items&&js.items.length){js.items.forEach(i=>{h+=`<div class="blk" style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:12px"><b>${i.title}</b><br>ID: ${i.tmdb_id||'N/A'}</div><button style="background:#0055ff;color:#fff;border:none;padding:8px;border-radius:4px" onclick="il('${i.tmdb_id||''}','${tp=='series'?'':(i.stream_url||'')}',${tp=='series'})">⬇️ Importar</button></div>`;});g('aR').innerHTML=h;}else{g('aR').innerHTML=`<div style="font-size:11px;text-align:left;color:#ffaa00;background:#222;padding:10px;border-radius:5px"><b>Resposta:</b><br>${txt}</div>`;}}catch(e){g('aR').innerHTML=`<div style="font-size:11px;color:#f00;text-align:left;background:#222;padding:10px;border-radius:5px"><b>Erro:</b><br>${txt?txt.substring(0,150):e.message}</div>`;}
g('b-api').innerText="🌐 BUSCAR NA API";}
function il(tmId,url,isS){if(bc>=5)return alert("Lote cheio");document.querySelector('input[name="md"][value="add"]').checked=true; tT(); ab();if(isS){document.querySelector(`input[name="t_${bc}"][value="s"]`).checked=true;mt(bc);g(`lB_${bc}`).value=url;}else{document.querySelector(`input[name="t_${bc}"][value="f"]`).checked=true;mt(bc);g(`lV_${bc}`).value=url;}g(`i_${bc}`).value=tmId;}

async function cc(){let o=v('gO'),r=v('gR'),t=v('gT'),fl='catalogo_pro.json';if(!o||!r||!t)return alert("Credenciais!");g('b-remC').innerText="⏳...";try{let rq=await fetch(`https://api.github.com/repos/${o}/${r}/contents/${fl}?t=${Date.now()}`,{headers:{Authorization:`Bearer ${t}`},cache:"no-store"});cat=JSON.parse(decodeURIComponent(escape(atob((await rq.json()).content.replace(/\s/g,'')))));let s=g('sR');s.innerHTML='';if(cat.length){cat.sort((a,b)=>a.titulo.localeCompare(b.titulo));cat.forEach(i=>{let op=document.createElement('option');op.value=i.id;op.text=`${i.tipo=='serie'?'📺':'🎬'} ${i.titulo}`;s.appendChild(op);});s.className='';g('b-rem').className='btn btn-del';}l("✅ Catálogo lido.");}catch(e){l("❌ Erro ao ler catálogo.");}g('b-remC').innerText="🔄 LER SITE";}
async function rc(){let o=v('gO'),r=v('gR'),t=v('gT'),id=v('sR'),fl='catalogo_pro.json';if(!id)return;g('b-rem').innerText="⏳...";try{cat=cat.filter(i=>i.id!=id);await sR(fl,JSON.stringify(cat,null,2),"rm "+id,t,o,r);l("✅ Apagado do site!");let s=g('sR');for(let i=0;i<s.options.length;i++)if(s.options[i].value==id)s.remove(i);}catch(e){l("❌ Erro.");}g('b-rem').innerText="🗑️ APAGAR DO SITE";}

async function p(){
let o=v('gO'),r=v('gR'),T=v('gT');if(!o||!r||!T)return alert("Preencha GitHub!");['gO','gR','gT'].forEach(i=>localStorage.setItem(i,v(i)));
let bv=[];for(let n=1;n<=bc;n++)if(g(`b_${n}`)&&v(`i_${n}`))bv.push(n);if(!bv.length)return alert("Preencha o ID!");
g('b-add').innerText="⏳ A LER DADOS...";l("Iniciando publicação segura...");
g('b-add').style.background = "#ff9900"; // Fica laranja para mostrar que está ocupado
try{let rq=await fetch(`https://api.github.com/repos/${o}/${r}/contents/catalogo_pro.json?t=${Date.now()}`,{headers:{Authorization:`Bearer ${T}`},cache:"no-store"});
let dt=[];if(rq.ok)try{dt=JSON.parse(decodeURIComponent(escape(atob((await rq.json()).content.replace(/\s/g,'')))));}catch(e){}

for(let n of bv){let I=v(`i_${n}`),isS=document.querySelector(`input[name="t_${n}"]:checked`).value=='s',ct=v(`c_${n}`),cap=v(`cp_${n}`),idS="";
let d=await(await fetch(`https://api.themoviedb.org/3/${isS?'tv':'movie'}/${I}?api_key=${AK}&language=pt-BR&append_to_response=images,content_ratings,release_dates&include_image_language=pt,en,null`)).json();
let t=isS?d.name:d.title,sn=d.overview||"Assista no KINGFILMS.",nt=d.vote_average?d.vote_average.toFixed(1):"7.5",sl=t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"");
let c=d.backdrop_path;if(d.images&&d.images.backdrops&&d.images.backdrops.length){let bs=d.images.backdrops,im=bs.find(x=>x.iso_639_1=='pt')||bs.find(x=>x.iso_639_1=='en')||bs.find(x=>x.iso_639_1==null)||bs[0];c=im.file_path;}
c=cap||(c?`https://image.tmdb.org/t/p/w1280${c}`:`https://image.tmdb.org/t/p/w780${d.poster_path}`);let dR=90;
if(isS){if(d.content_ratings&&d.content_ratings.results){let br=d.content_ratings.results.find(x=>x.iso_3166_1=='BR');if(br&&br.rating)idS=br.rating;}dR=(d.episode_run_time&&d.episode_run_time.length)?d.episode_run_time[0]:(d.last_episode_to_air&&d.last_episode_to_air.runtime?d.last_episode_to_air.runtime:24);}
else{if(d.release_dates&&d.release_dates.results){let br=d.release_dates.results.find(x=>x.iso_3166_1=='BR');if(br&&br.release_dates.length)idS=br.release_dates[0].certification;}dR=d.runtime||90;}

if(!idS)idS="16";
if(idS=="L")idS="Livre";

let iD=fD(dR),tp={};
if(isS){
    let bE=v(`lB_${n}`),st=parseInt(v(`iE_${n}`));if(!bE||isNaN(st)){l(`❌ Bloco ${n} falhou (Verifique a Base ou ID).`);continue;}
    let eps=[];if(d.seasons){d.seasons.forEach(x=>{if(x.season_number>0)eps.push(x.episode_count);});}
    if(!eps.length){l(`❌ Bloco ${n} falhou (Série sem episódios no TMDB).`);continue;}
    let idE=st;
    let totalEps = eps.reduce((a, b) => a + b, 0);
    let epCount = 1;
    
    for(let s_=1;s_<=eps.length;s_++){
        tp[s_]=[];
        for(let e_=1;e_<=eps[s_-1];e_++){
            let ss=s_<10?"0"+s_:s_,ee=e_<10?"0"+e_:e_,nxE=(e_+1)<10?"0"+(e_+1):(e_+1),nxS=(s_+1)<10?"0"+(s_+1):(s_+1);
            let nx=e_<eps[s_-1]?`${sl}-s${ss}e${nxE}.html`:(s_<eps.length?`${sl}-s${nxS}e01.html`:"../index.html");let fl=`${sl}-s${ss}e${ee}.html`,vd=bE+idE+v(`sf_${n}`);
            
            g('b-add').innerText=`⏳ ENVIANDO EP ${epCount} DE ${totalEps}...`;
            await sR(`v/${fl}`,gh(`${t} S${ss}E${ee} 🌀`,c,vd,nx,iD),"ep",T,o,r);
            tp[s_].push({tit:`S${ss}E${ee} 🌀`,linkFisico:`v/${fl}`,logoEp:c});
            idE++; epCount++;
            
            // DELAY SEGURO PARA EVITAR BLOQUEIO DO GITHUB (300ms)
            await new Promise(x=>setTimeout(x,300));
        }
    }
}
else{let vd=v(`lV_${n}`),fl=`${sl}.html`;if(!vd){l(`❌ Bloco ${n} falhou (Link vazio).`);continue;} g('b-add').innerText=`⏳ ENVIANDO FILME...`; await sR(`v/${fl}`,gh(`${t} 🌀`,c,vd,"../index.html",iD),"fl",T,o,r);tp={"1":[{tit:"Assistir 🌀",linkFisico:`v/${fl}`,logoEp:c}]};}
dt=dt.filter(i=>i.id!=sl);dt.push({id:sl,tipo:isS?'serie':'filme',categoria:ct,titulo:`${t} 🌀`,logo:c,sinopse:sn,avaliacao:nt,classificacao:idS,temporadas:tp});l(`✅ ${t} processado!`);}

g('b-add').innerText=`⏳ ATUALIZANDO CATÁLOGO...`;
await sR("catalogo_pro.json",JSON.stringify(dt,null,2),"Atualizando Catálogo Principal",T,o,r);
l("✅ TUDO FINALIZADO E PUBLICADO!");g('b-add').innerText="🚀 PUBLICAR CONTEÚDO"; g('b-add').style.background = "#e50914";}catch(e){l("❌ Erro Geral: "+e.message);g('b-add').innerText="TENTAR NOVAMENTE"; g('b-add').style.background = "#e50914";}}
function gh(t,c,l,n,d){let i=Math.floor(Math.random()*5000)+5000;return `<!DOCTYPE html><html lang="pt-BR"><head><title>${t}</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script type="application/ld+json">{"@context":"https://schema.org","@type":"VideoObject","name":"${t}","thumbnailUrl":["${c}"],"uploadDate":"2024-01-01T00:00:00Z","duration":"${d}","contentUrl":"${l}","interactionStatistic":{"@type":"InteractionCounter","interactionType":{"@type":"WatchAction"},"userInteractionCount":${i}}}</`+`script><style>body{background:#000;text-align:center;font-family:sans-serif;margin:0;padding:15px}.f{position:relative;max-width:800px;margin:20px auto;aspect-ratio:16/9;background:url('${c}') center/cover;border-radius:12px;cursor:pointer;border:1px solid #222}.o{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}.p{width:80px;height:80px;background:linear-gradient(45deg,#e50914,#b00710);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(229,9,20,.7)}.t{border-top:16px solid transparent;border-bottom:16px solid transparent;border-left:26px solid #fff;margin-left:6px}h1{color:#eee;font-size:24px}.nx{background:#e50914;color:#fff;padding:12px 30px;text-decoration:none;border-radius:8px;font-weight:bold;display:inline-block}</style></head><body><div class="f" onclick="location.href='${l}'"><div class="o"><div class="p"><div class="t"></div></div></div></div><h1>${t}</h1><a href="${n}" class="nx">Próximo</a></body></html>`;}
</script></body></html>
